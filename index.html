<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quad-Renju 2vs2 Live</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #121212; --board: #e3c18d; --board-border: #8b5a2b;
            --text: #e0e0e0; --accent: #ffcc00; --active: #2ecc71; --error: #e74c3c;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0; height: 100vh; overflow: hidden; touch-action: manipulation;
        }

        /* --- ログイン画面 --- */
        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.95); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: #222; padding: 30px; border-radius: 15px; border: 1px solid #444;
            text-align: center; width: 80%; max-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .login-box input {
            width: 100%; padding: 10px; margin: 15px 0; border-radius: 5px; border: none;
            box-sizing: border-box; font-size: 1rem; text-align: center;
        }
        .login-box button {
            background: var(--accent); color: #000; font-weight: bold; padding: 10px 20px;
            border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; width: 100%;
        }

        /* --- ゲーム画面 --- */
        #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        
        #url-share {
            background: #333; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem;
            margin-bottom: 10px; cursor: pointer; border: 1px solid #555;
        }

        .seats {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            margin-bottom: 10px; width: 95vw; max-width: 450px;
        }
        .seat-btn {
            background: #2a2a2a; color: white; border: 2px solid #444; padding: 8px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .seat-btn span.role { font-size: 0.7rem; color: #aaa; margin-bottom: 3px; }
        .seat-btn span.name { font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
        .seat-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .seat-btn.occupied { background: #3a3a3a; border-color: #555; }
        .seat-btn.my-seat { border-color: var(--active); background: #1a3a2a; }
        .seat-btn.active-turn { box-shadow: 0 0 12px var(--active); transform: scale(1.02); border-color: var(--active); }

        #board-container { position: relative; }
        #board {
            display: grid; grid-template-columns: repeat(15, 1fr);
            width: 95vw; height: 95vw; max-width: 450px; max-height: 450px;
            background-color: var(--board); border: 4px solid var(--board-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cell { border: 0.5px solid rgba(0,0,0,0.2); position: relative; display: flex; align-items: center; justify-content: center; }
        .cell::before { content: ''; position: absolute; width: 100%; height: 1px; background: rgba(0,0,0,0.4); }
        .cell::after { content: ''; position: absolute; width: 1px; height: 100%; background: rgba(0,0,0,0.4); }

        .stone {
            width: 85%; height: 85%; border-radius: 50%; z-index: 2;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4); animation: pop 0.2s ease-out;
        }
        .stone.black { background: radial-gradient(circle at 30% 30%, #555, #000); }
        .stone.white { background: radial-gradient(circle at 30% 30%, #fff, #ddd); }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #message { margin-top: 15px; font-size: 1.1rem; font-weight: bold; min-height: 1.5em; text-align: center;}

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 10; display: none;
            align-items: center; justify-content: center; flex-direction: column;
        }
        #overlay button {
            margin-top: 20px; padding: 10px 20px; font-size: 1.1rem;
            background: var(--accent); border: none; color: black; font-weight: bold; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
    <div class="login-box">
        <h2>プレイヤー登録</h2>
        <input type="text" id="player-name-input" placeholder="あなたの名前を入力" maxlength="10">
        <button onclick="enterRoom()">ルームに入る</button>
    </div>
</div>

<!-- ゲーム画面 -->
<div id="game-screen">
    <div id="url-share" onclick="copyUrl()">🔄 URLをコピーしてLINEで共有</div>

    <div class="seats">
        <button id="seat-0" class="seat-btn" onclick="takeSeat(0)">
            <span class="role">Team A(1) [黒]</span><span class="name" id="name-0">空席</span>
        </button>
        <button id="seat-1" class="seat-btn" onclick="takeSeat(1)">
            <span class="role">Team B(1) [白]</span><span class="name" id="name-1">空席</span>
        </button>
        <button id="seat-2" class="seat-btn" onclick="takeSeat(2)">
            <span class="role">Team A(2) [黒]</span><span class="name" id="name-2">空席</span>
        </button>
        <button id="seat-3" class="seat-btn" onclick="takeSeat(3)">
            <span class="role">Team B(2) [白]</span><span class="name" id="name-3">空席</span>
        </button>
    </div>

    <div id="board-container">
        <div id="board"></div>
        <div id="overlay">
            <h2 id="result-text"></h2>
            <button onclick="publishReset()">もう一度遊ぶ</button>
        </div>
    </div>

    <div id="message">サーバーに接続中...</div>
</div>

<script>
// --- セッション管理 (リロードしても席を維持するため) ---
let myClientId = sessionStorage.getItem('qr_clientId');
if (!myClientId) {
    myClientId = Math.random().toString(36).substring(2, 10);
    sessionStorage.setItem('qr_clientId', myClientId);
}
let myName = sessionStorage.getItem('qr_playerName') || '';

// --- ゲーム状態 ---
const SIZE = 15;
let board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
let turn = 0;
let seats = [null, null, null, null]; // { id: 'client_id', name: 'player_name' }
let gameState = 'waiting'; // waiting, playing, finished

// --- DOM ---
const boardEl = document.getElementById('board');
const msgEl = document.getElementById('message');
const overlayEl = document.getElementById('overlay');
const resultTextEl = document.getElementById('result-text');

// --- ルームURL設定 ---
let roomId = location.hash.substring(1);
if (!roomId) {
    roomId = Math.random().toString(36).substring(2, 8);
    location.hash = roomId;
}

// --- MQTT通信設定 ---
const topic = `quad-renju/room/${roomId}`;
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

client.on('connect', () => {
    client.subscribe(topic);
    if (myName) {
        showGameScreen();
        // 新しく入った時、すでにいる人に現在の状況をリクエストする
        client.publish(topic, JSON.stringify({ type: 'sync_req', targetId: myClientId }));
    }
});

client.on('message', (t, message) => {
    const data = JSON.parse(message.toString());
    
    if (data.type === 'take_seat') {
        seats[data.seatIdx] = { id: data.clientId, name: data.name };
        checkGameStart();
        updateUI();
    } 
    else if (data.type === 'move') {
        processMove(data.r, data.c, data.turn);
    } 
    else if (data.type === 'reset') {
        executeReset();
    }
    else if (data.type === 'sync_req' && data.targetId !== myClientId) {
        // 誰かが入室して同期を求めてきたら、自分が知っている情報を送ってあげる
        // ※誰も席に座っていない場合は送らない
        if (seats.some(s => s !== null)) {
            client.publish(topic, JSON.stringify({ type: 'sync_state', seats, board, turn, gameState }));
        }
    }
    else if (data.type === 'sync_state') {
        // 現在の状況を受け取って反映する
        seats = data.seats;
        board = data.board;
        turn = data.turn;
        gameState = data.gameState;
        renderFullBoard();
        updateUI();
    }
});

// --- 画面遷移 ---
document.getElementById('player-name-input').value = myName;

function enterRoom() {
    const input = document.getElementById('player-name-input').value.trim();
    if (!input) { alert("名前を入力してください"); return; }
    myName = input;
    sessionStorage.setItem('qr_playerName', myName);
    showGameScreen();
    client.publish(topic, JSON.stringify({ type: 'sync_req', targetId: myClientId }));
}

function showGameScreen() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    initBoard();
    updateUI();
}

// --- ゲームロジック ---
function initBoard() {
    boardEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => handleCellClick(r, c);
            boardEl.appendChild(cell);
        }
    }
}

function takeSeat(seatIdx) {
    // すでに他の席に座っているかチェック (1人1席の制限)
    const myCurrentSeat = seats.findIndex(s => s && s.id === myClientId);
    if (myCurrentSeat !== -1 && myCurrentSeat !== seatIdx) {
        alert("すでに席についています。1人1席までです！");
        return;
    }
    if (seats[seatIdx] !== null) return; // 既に埋まっている

    client.publish(topic, JSON.stringify({ type: 'take_seat', seatIdx, clientId: myClientId, name: myName }));
}

function checkGameStart() {
    // 4人全員揃ったか判定
    if (gameState === 'waiting' && seats.every(s => s !== null)) {
        gameState = 'playing';
    }
}

function handleCellClick(r, c) {
    if (gameState !== 'playing' || board[r][c] !== 0) return;
    
    const myCurrentSeat = seats.findIndex(s => s && s.id === myClientId);
    if (myCurrentSeat === -1) {
        alert("席についてから打ってください");
        return;
    }
    if (myCurrentSeat !== turn) {
        alert("あなたの番ではありません！");
        return;
    }

    client.publish(topic, JSON.stringify({ type: 'move', r, c, turn }));
}

function processMove(r, c, moveTurn) {
    if (gameState !== 'playing' || board[r][c] !== 0) return;
    
    const isBlack = (moveTurn % 2 === 0);
    const colorCode = isBlack ? 1 : 2;
    
    board[r][c] = colorCode;
    renderStone(r, c, isBlack);
    
    const winStatus = checkWin(r, c, colorCode);
    if (winStatus === 'win') {
        endGame(isBlack ? 'A' : 'B');
        return;
    } else if (winStatus === 'lose_chouren') {
        endGame('B', '黒の長連（禁手）によりTeam Bの勝利！');
        return;
    }

    turn = (moveTurn + 1) % 4;
    updateUI();
}

function renderStone(r, c, isBlack) {
    const cell = boardEl.children[r * SIZE + c];
    if(cell.children.length > 0) return; // 既に石がある場合はスキップ
    const stone = document.createElement('div');
    stone.className = `stone ${isBlack ? 'black' : 'white'}`;
    cell.appendChild(stone);
}

function renderFullBoard() {
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (board[r][c] !== 0) {
                renderStone(r, c, board[r][c] === 1);
            }
        }
    }
}

// 勝利判定
function checkWin(r, c, colorCode) {
    const dirs = [[1,0], [0,1], [1,1], [1,-1]];
    let isBlack = (colorCode === 1);
    for (let [dr, dc] of dirs) {
        let count = 1;
        for (let i = 1; i < 9; i++) {
            let nr = r + dr * i, nc = c + dc * i;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === colorCode) count++; else break;
        }
        for (let i = 1; i < 9; i++) {
            let nr = r - dr * i, nc = c - dc * i;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === colorCode) count++; else break;
        }
        if (isBlack) {
            if (count > 5) return 'lose_chouren';
            if (count === 5) return 'win';
        } else {
            if (count >= 5) return 'win';
        }
    }
    return 'continue';
}

function updateUI() {
    // 席ボタンの表示更新
    seats.forEach((seatData, i) => {
        const btn = document.getElementById(`seat-${i}`);
        const nameSpan = document.getElementById(`name-${i}`);
        
        if (seatData) {
            nameSpan.innerText = seatData.name;
            btn.classList.add('occupied');
            btn.classList.toggle('my-seat', seatData.id === myClientId);
        } else {
            nameSpan.innerText = "空席 (タップで参加)";
            btn.classList.remove('occupied', 'my-seat');
        }
        
        if (gameState === 'playing') {
            btn.classList.toggle('active-turn', i === turn);
        } else {
            btn.classList.remove('active-turn');
        }
    });

    // メッセージの更新
    if (gameState === 'waiting') {
        const emptyCount = seats.filter(s => s === null).length;
        msgEl.innerText = emptyCount > 0 ? `あと ${emptyCount} 人の参加を待っています...` : "ゲーム開始！";
        msgEl.style.color = "#ffcc00";
    } else if (gameState === 'playing') {
        const currentSeat = seats[turn];
        const mySeatIdx = seats.findIndex(s => s && s.id === myClientId);
        
        if (mySeatIdx === turn) {
            msgEl.innerText = "👉 あなたの番です！";
            msgEl.style.color = "#2ecc71";
        } else {
            msgEl.innerText = `⏳ ${currentSeat ? currentSeat.name : '相手'} の番を待っています...`;
            msgEl.style.color = "#e0e0e0";
        }
    }
}

function endGame(winnerTeam, customMsg = null) {
    gameState = 'finished';
    overlayEl.style.display = 'flex';
    resultTextEl.innerText = customMsg ? customMsg : `👑 Team ${winnerTeam} の勝利！`;
}

function publishReset() {
    client.publish(topic, JSON.stringify({ type: 'reset' }));
}

function executeReset() {
    board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
    turn = 0;
    gameState = 'playing'; // メンバーはそのまま維持して再戦
    overlayEl.style.display = 'none';
    initBoard();
    updateUI();
}

function copyUrl() {
    navigator.clipboard.writeText(window.location.href);
    const btn = document.getElementById('url-share');
    btn.innerText = "✅ コピーしました！";
    setTimeout(() => btn.innerText = "🔄 URLをコピーしてLINEで共有", 2000);
}
</script>
</body>
</html>
